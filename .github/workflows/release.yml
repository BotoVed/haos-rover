name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify version consistency
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MANIFEST_VERSION=$(jq -r '.version' custom_components/rover/manifest.json)
          INIT_VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' custom_components/rover/__init__.py)
          if [ "$TAG" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag $TAG does not match manifest.json version $MANIFEST_VERSION"
            exit 1
          fi
          if [ "$TAG" != "$INIT_VERSION" ]; then
            echo "::error::Tag $TAG does not match __init__ version $INIT_VERSION"
            exit 1
          fi
          echo "Version check OK: all match $TAG"

      - name: Build rover.zip
        run: |
          cd custom_components/rover
          zip -r ../../rover.zip . -x "__pycache__/*" "*.pyc"
          cd ../..
          echo "ZIP contents:"
          unzip -l rover.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" --title "v$TAG" --generate-notes rover.zip
